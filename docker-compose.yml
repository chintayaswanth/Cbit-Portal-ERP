version: "3.9"

services:
  backend:
    build: ./backend
    container_name: erp-backend
    ports:
      - "5000:5000"
    environment:
      - DOCKER_ENV=true
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: erp-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped